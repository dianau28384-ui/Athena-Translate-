<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kagi-Style Personal Translator</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: -0.05em;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 1.1rem;
            margin: 0;
        }

        /* Translator Layout */
        .translator-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            padding: 24px;
            margin-bottom: 30px;
        }

        .workspace {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .box {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text);
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            resize: none;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text);
            background-color: var(--bg);
            box-sizing: border-box;
            transition: all 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--card-bg);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        textarea[readonly] {
            background-color: #f1f5f9;
            cursor: default;
        }

        .btn-swap {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--primary);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
            margin-top: 26px;
            flex-shrink: 0;
        }

        .btn-swap:hover {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: scale(1.08);
        }

        /* Custom Dictionary Section */
        .dict-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            padding: 24px;
        }

        .dict-card h2 {
            margin-top: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dict-inputs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .dict-inputs input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .dict-inputs input:focus {
            border-color: var(--primary);
        }

        .btn-add {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-add:hover { background-color: #059669; }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .dict-tag {
            background: #eff6ff;
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #bfdbfe;
            font-weight: 500;
        }

        .dict-tag span {
            cursor: pointer;
            color: var(--danger);
            font-weight: bold;
            font-size: 16px;
            line-height: 1;
        }

        .dict-tag span:hover { color: #b91c1c; }

        /* Responsive */
        @media (max-width: 768px) {
            .workspace { flex-direction: column; gap: 10px; }
            .btn-swap { margin-top: 0; transform: rotate(90deg); }
            .btn-swap:hover { transform: rotate(90deg) scale(1.08); }
            .dict-inputs { flex-direction: column; }
            .btn-add { padding: 12px; }
            .container { margin: 20px auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Custom Translator</h1>
        <p class="subtitle">ระบบแปลภาษาส่วนตัวแบบออฟไลน์ ล็อคคำศัพท์ได้ตามใจชอบ</p>
    </header>

    <div class="translator-card">
        <div class="workspace">
            <div class="box">
                <label id="lblSource">ภาษาอังกฤษ (English)</label>
                <textarea id="sourceText" placeholder="พิมพ์ข้อความที่นี่เพื่อแปลทันที..." oninput="translateLocal()"></textarea>
            </div>
            
            <button class="btn-swap" onclick="swapLanguages()" title="สลับภาษา">⇄</button>
            
            <div class="box">
                <label id="lblTarget">ภาษาไทย (Thai)</label>
                <textarea id="targetText" placeholder="ผลลัพธ์การแปลจะปรากฏตรงนี้..." readonly></textarea>
            </div>
        </div>
    </div>

    <div class="dict-card">
        <h2>⚙️ Kagi-Style Custom Dictionary</h2>
        <p style="color: var(--text-light); font-size: 14px; margin-top: -5px; margin-bottom: 20px;">
            กำหนดคำแปลเฉพาะทางเพื่อไม่ให้ระบบแปลผิด (ระบบจะอิงตามทิศทางภาษาต้นฉบับในปัจจุบัน)
        </p>
        
        <div class="dict-inputs">
            <input type="text" id="origWord" placeholder="คำต้นฉบับ (เช่น apple)">
            <input type="text" id="customTrans" placeholder="คำแปลที่ต้องการ (เช่น บริษัทแอปเปิ้ล)">
            <button class="btn-add" onclick="addCustomWord()">เพิ่มคำศัพท์</button>
        </div>

        <div class="tags-container" id="dictTags">
            </div>
    </div>
</div>

<script>
    let isEnToTh = true;

    // คลังคำศัพท์ตั้งต้น (คุณเพิ่มคำศัพท์ที่ต้องการตรงนี้ได้เลย)
    const mainDictionaryEnToTh = {
        "hello": "สวัสดี", "world": "โลก", "cat": "แมว", "dog": "สุนัข",
        "apple": "แอปเปิ้ล (ผลไม้)", "banana": "กล้วย", "computer": "คอมพิวเตอร์",
        "love": "รัก", "thank you": "ขอบคุณ", "good morning": "อรุณสวัสดิ์"
    };

    const mainDictionaryThToEn = {
        "สวัสดี": "hello", "โลก": "world", "แมว": "cat", "สุนัข": "dog",
        "แอปเปิ้ล": "apple", "กล้วย": "banana", "คอมพิวเตอร์": "computer",
        "รัก": "love", "ขอบคุณ": "thank you", "อรุณสวัสดิ์": "good morning"
    };

    let customDictEnToTh = JSON.parse(localStorage.getItem('customDictEnToTh')) || {};
    let customDictThToEn = JSON.parse(localStorage.getItem('customDictThToEn')) || {};

    function translateLocal() {
        const sourceText = document.getElementById('sourceText').value;
        const targetTextArea = document.getElementById('targetText');
        
        if (!sourceText.trim()) {
            targetTextArea.value = "";
            return;
        }

        const currentMain = isEnToTh ? mainDictionaryEnToTh : mainDictionaryThToEn;
        const currentCustom = isEnToTh ? customDictEnToTh : customDictThToEn;
        const finalDictionary = { ...currentMain, ...currentCustom };

        let translatedText = sourceText;
        const sortedKeys = Object.keys(finalDictionary).sort((a, b) => b.length - a.length);

        for (const key of sortedKeys) {
            let regex;
            if (isEnToTh) {
                regex = new RegExp(`\\b${key}\\b`, 'gi');
            } else {
                regex = new RegExp(key, 'g');
            }
            translatedText = translatedText.replace(regex, finalDictionary[key]);
        }

        targetTextArea.value = translatedText;
    }

    function swapLanguages() {
        const sourceText = document.getElementById('sourceText');
        const targetText = document.getElementById('targetText');
        const lblSource = document.getElementById('lblSource');
        const lblTarget = document.getElementById('lblTarget');
        const origWordInput = document.getElementById('origWord');
        const customTransInput = document.getElementById('customTrans');

        isEnToTh = !isEnToTh;

        if (isEnToTh) {
            lblSource.innerText = "ภาษาอังกฤษ (English)";
            lblTarget.innerText = "ภาษาไทย (Thai)";
            origWordInput.placeholder = "คำอังกฤษ (เช่น cat)";
            customTransInput.placeholder = "คำแปลไทย (เช่น เหมียว)";
        } else {
            lblSource.innerText = "ภาษาไทย (Thai)";
            lblTarget.innerText = "ภาษาอังกฤษ (English)";
            origWordInput.placeholder = "คำไทย (เช่น เหมียว)";
            customTransInput.placeholder = "คำแปลอังกฤษ (เช่น cat)";
        }

        const tempText = sourceText.value;
        sourceText.value = targetText.value;
        targetText.value = tempText;

        renderTags();
        translateLocal();
    }

    function renderTags() {
        const container = document.getElementById('dictTags');
        container.innerHTML = '';
        const currentCustom = isEnToTh ? customDictEnToTh : customDictThToEn;

        for (const [key, value] of Object.entries(currentCustom)) {
            container.innerHTML += `
                <div class="dict-tag">
                    <strong>${key}</strong> ➔ ${value}
                    <span onclick="deleteWord('${key}')">×</span>
                </div>
            `;
        }
    }

    function addCustomWord() {
        const origInput = document.getElementById('origWord');
        const transInput = document.getElementById('customTrans');
        let orig = origInput.value.trim();
        let trans = transInput.value.trim();
        
        if (isEnToTh) orig = orig.toLowerCase();
        else trans = trans.toLowerCase();

        if (orig && trans) {
            if (isEnToTh) {
                customDictEnToTh[orig] = trans;
                localStorage.setItem('customDictEnToTh', JSON.stringify(customDictEnToTh));
            } else {
                customDictThToEn[orig] = trans;
                localStorage.setItem('customDictThToEn', JSON.stringify(customDictThToEn));
            }
            renderTags();
            translateLocal();
            origInput.value = '';
            transInput.value = '';
        }
    }

    function deleteWord(key) {
        if (isEnToTh) {
            delete customDictEnToTh[key];
            localStorage.setItem('customDictEnToTh', JSON.stringify(customDictEnToTh));
        } else {
            delete customDictThToEn[key];
            localStorage.setItem('customDictThToEn', JSON.stringify(customDictThToEn));
        }
        renderTags();
        translateLocal();
    }

    renderTags();
</script>

</body>
</html>
